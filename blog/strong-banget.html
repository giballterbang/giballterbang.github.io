  <style amp-custom>
    :root {

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {

    /* ═══════════════ BG ATMOSPHERE ═══════════════ */
    .bg-atmos {

      background:

        radial-gradient(ellipse at 70% 90%, rgba(209,213,219,0.05) 0%, transparent 45%),

    /* Ornamental divider */
    .divider {

    }

    .div-gem {

    .div-gem::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--gold-2), var(--gold-1));
      transform: rotate(45deg);
      border-top: 1px solid rgba(255,255,255,0.2);
      border-left: 1px solid rgba(255,255,255,0.1);

    }

    /* ═══════════════════════════════════════════════
       DEEP 3D FRAME — 5 NESTED LAYERS
       ═══════════════════════════════════════════════ */

    /* LAYER 1: Outermost animated rainbow gold border */
    .frame-L1 {
      position: relative;
      border-radius: 24px;
      padding: 3px;
      margin-bottom: 28px;
      background: linear-gradient(
        90deg,
        var(--gold-4), var(--gold-2), var(--gold-1),
        var(--rose), var(--gold-1), var(--emerald),
        var(--gold-5), var(--gold-3), var(--gold-4)
      );
      background-size: 500% 100%;
      animation: rainbowShift 10s linear infinite;
    }

    @keyframes rainbowShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 500% 50%; }
    }

    /* LAYER 2: Dark bevel ridge — simulates outer depth step */
    .frame-L2 {
      border-radius: 21px;
      padding: 4px;
      background: linear-gradient(165deg, #121212 0%, #080808 50%, #000000 100%);
      border-top: 1px solid rgba(212,175,55,0.1);
      border-bottom: 2px solid #000;
      position: relative;
    }

    /* LAYER 3: Inner gold trim — thinner animated accent */
    .frame-L3 {
      border-radius: 17px;
      padding: 2px;
      background: linear-gradient(
        90deg,
        rgba(212,175,55, 0.25), rgba(212,175,55, 0.40),
        rgba(212,175,55, 0.40), rgba(212,175,55, 0.25),
        rgba(212,175,55, 0.25)
      );
      background-size: 300% 100%;
      animation: innerTrim 6s linear infinite;
      position: relative;
    }

    @keyframes innerTrim {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    /* LAYER 4: Deep inset bevel — creates the "sunken" feel */
    .frame-L4 {
      border-radius: 15px;
      padding: 6px;
      background: linear-gradient(175deg, #050505 0%, #0a0a0a 40%, #121212 100%);
      border-top: 2px solid rgba(0,0,0,0.7);
      border-left: 1px solid rgba(0,0,0,0.5);
      border-right: 1px solid rgba(30,30,40,0.6);
      border-bottom: 1px solid rgba(212,175,55,0.1);
      position: relative;
    }

    /* Inset light gradient — simulates light hitting the inner edge */
    .frame-L4::before {
      content: "";
      position: absolute;
      top: 2px; left: 2px; right: 2px;
      height: 50%;
      border-radius: 13px 13px 0 0;
      background: linear-gradient(180deg, rgba(212,175,55,0.05) 0%, transparent 100%);
      pointer-events: none;
    }

    /* Bottom inner edge highlight */
    .frame-L4::after {
      content: "";
      position: absolute;
      bottom: 2px; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.1), transparent);
      pointer-events: none;
    }

    /* LAYER 5: Content surface with depth texture */
    .frame-L5 {
      border-radius: 10px;
      background:
        linear-gradient(178deg,
          rgba(30,30,30,0.6) 0%,
          rgba(17,17,17,0.95) 15%,
          var(--dark-2) 50%,
          var(--dark-1) 100%
        );
      padding: 20px 16px 24px;
      position: relative;
      overflow: hidden;
      border-top: 1px solid rgba(212,175,55,0.04);
      border-bottom: 1px solid rgba(0,0,0,0.5);
    }

    /* Surface scanline texture */
    .frame-L5::before {
      content: "";
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 4px,
        rgba(212,175,55,0.02) 4px, rgba(212,175,55,0.02) 5px
      );
      pointer-events: none;
      z-index: 1;
      border-radius: 10px;
    }

    /* Top light reflection on surface */
    .frame-L5::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 100px;
      background: linear-gradient(180deg, rgba(212,175,55,0.05) 0%, transparent 100%);
      pointer-events: none;
      border-radius: 10px 10px 0 0;
    }

    /* Corner rivets */
    .rivet {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      z-index: 5;
      background: linear-gradient(145deg, var(--gold-2), var(--gold-4));
      border-top: 1px solid rgba(255,255,255,0.2);
      border-bottom: 1px solid rgba(0,0,0,0.5);
    }
    .rivet::after {
      content: "";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--gold-4);
      border-top: 1px solid rgba(0,0,0,0.3);
    }
    .rivet-tl { top: 8px; left: 8px; }
    .rivet-tr { top: 8px; right: 8px; }
    .rivet-bl { bottom: 8px; left: 8px; }
    .rivet-br { bottom: 8px; right: 8px; }

    /* ═══════════════ HERO IMAGE ═══════════════ */
    .hero-outer {

    .hero-img { display: block; border-radius: 6px; }

    /* ═══════════════ TITLE ═══════════════ */
    .title-row {

    /* ═══════════════ DEEP 3D BUTTONS ═══════════════ */
    .cta-row {

      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
      position: relative;
      z-index: 2;
    }

    /* Button outer bevel frame */
    .cta-frame {
      border-radius: 12px;
      padding: 2px;
      position: relative;
      overflow: hidden;
    }

   .cta-frame--gold,
   .cta-frame--dark {
      background: linear-gradient(
        165deg,
        #D4AF37,
        #8B6508,
        #000000

    }

    /* Animated shimmer on button frame */
    .cta-frame::before {
      content: "";
      position: absolute;
      top: 0; left: -150%;
      width: 80%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: skewX(-25deg);
      animation: btnShine 4.5s ease-in-out infinite;
      pointer-events: none;
      z-index: 3;
    }

    .cta-row:last-of-type .cta-frame:first-child::before { animation-delay: 1s; }
    .cta-row:first-of-type .cta-frame:last-child::before { animation-delay: 0.5s; }
    .cta-row:last-of-type .cta-frame:last-child::before { animation-delay: 1.5s; }

    @keyframes btnShine {
      0%, 50%, 100% { left: -150%; opacity: 0; }
      60% { opacity: 1; }
      78% { left: 180%; opacity: 0; }
    }

    .cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      padding: 15px 10px;
      border-radius: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 17px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: transform 0.12s ease;
      border: none;

    }

    .cta-btn:active {
      transform: translateY(2px) scale(0.97);

    .cta-btn--gold {

        #000000  0%,
        #111111  30%,
        #D4AF37 60%,
        #8B6508 80%,

      border-left: 1px solid rgba(255,255,255,0.2);
      border-right: 1px solid rgba(255,255,255,0.2);
      border-bottom: 3px solid rgba(0,0,0,0.8);
    }

    .cta-btn--gold:active {
      border-top-width: 1px;
      border-bottom-width: 1px;
    }

    .cta-btn--dark {

        170deg,

      color: #FFFFFF;

    /* ═══════════════ BANK STATUS ═══════════════ */
    .bank-section {

    .bank-section::before {
      content: "";

    .bank-title {

    /* Deep 3D bank chips */
    .bank-chip {

      gap: 4px;
      padding: 5px 8px;
      border-radius: 8px;
      height: 34px;
      background: linear-gradient(175deg, rgba(30,30,45,0.5) 0%, rgba(15,15,22,0.8) 100%);
      border-top: 1px solid rgba(50,50,70,0.4);

      border-right: 1px solid rgba(5,5,8,0.5);
      border-bottom: 2px solid rgba(0,0,0,0.6);

    .bank-chip::before {
      content: "";

      top: 1px; left: 1px; right: 1px;

      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);

    /* ═══════════════ FOOTER ═══════════════ */
    .footer {
      text-align: center;

    }

      align-items: center;

      background: var(--gold-1);

    }

    /* Deep 3D footer icon tiles */
    .footer-icons {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .fi-outer {
      border-radius: 12px;
      padding: 2px;
      background: linear-gradient(150deg, rgba(212,175,55,0.3), rgba(212,175,55,0.1), rgba(0,0,0,0.3));

      background: linear-gradient(175deg, #0a0a0a 0%, #050505 100%);

      border-bottom: 1px solid rgba(212,175,55,0.1);

    .fi-inner {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 9px;
      background: linear-gradient(170deg, var(--dark-4) 0%, var(--dark-2) 100%);
      border-top: 1px solid rgba(60,60,80,0.3);
      border-bottom: 1px solid rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }

    /* Icon shiny sweep */
    .fi-inner::after {
      content: "";
      position: absolute;
      top: 0; left: -120%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      animation: iconSweep 6s ease-in-out infinite;
      pointer-events: none;
    }
    .footer-icons > :nth-child(2) .fi-inner::after { animation-delay: 1s; }
    .footer-icons > :nth-child(3) .fi-inner::after { animation-delay: 2s; }
    .footer-icons > :nth-child(4) .fi-inner::after { animation-delay: 3s; }
    .footer-icons > :nth-child(5) .fi-inner::after { animation-delay: 4s; }

    @keyframes iconSweep {
      0%, 50%, 100% { left: -120%; }
      70% { left: 170%; }
    }

    .fi-inner svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: var(--gold-1);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.8;
      position: relative;
      z-index: 2;
    }

    .footer-text {
      font-family: 'Cormorant Garamond', serif;

    }

    /* Animated rainbow bar */
    .rainbow-bar {
      width: 55%;
      height: 2px;
      margin: 18px auto 0;
      border-radius: 2px;
      position: relative;
    }

    .rainbow-bar::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 2px;
      background: linear-gradient(90deg,
        var(--gold-4), var(--gold-2), var(--rose),
        var(--gold-1), var(--emerald), var(--gold-5), var(--gold-4));
      background-size: 400% 100%;
      animation: rainbowShift 8s linear infinite;
      opacity: 0.4;
    }

    /* ═══════════════ FLOATING PARTICLES ═══════════════ */
    .ptcl {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .ptcl-1 {
      width: 2px; height: 2px;
      background: var(--gold-1);
      top: 12%; left: 15%;
      animation: drift 12s ease-in-out infinite;
    }
    .ptcl-2 {
      width: 3px; height: 3px;
      background: var(--rose);
      top: 50%; right: 12%;
      animation: drift 16s ease-in-out infinite 3s;
    }
    .ptcl-3 {
      width: 2px; height: 2px;
      background: var(--gold-2);
      top: 80%; left: 20%;
      animation: drift 14s ease-in-out infinite 6s;
    }
    .ptcl-4 {
      width: 1px; height: 1px;
      background: var(--gold-5);
      top: 30%; right: 25%;
      animation: drift 18s ease-in-out infinite 2s;
    }

    @keyframes drift {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0; }
      15% { opacity: 0.5; }
      50% { transform: translateY(-50px) scale(1.8); opacity: 0.7; }
      85% { opacity: 0.3; }
    }
  </style>
</head>
